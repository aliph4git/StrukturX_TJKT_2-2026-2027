        function updateClockAndSchedule() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\./g, ':');
            document.getElementById('realtime-clock').innerText = timeString;

            const days = ['minggu', 'senin', 'selasa', 'rabu', 'kamis', 'jumat', 'sabtu'];
            const currentDay = days[now.getDay()];
            const container = document.getElementById('current-subject-container');

            if (currentDay === 'sabtu' || currentDay === 'minggu') {
                if (currentScheduleState !== "libur") {
                    container.innerHTML = `<div class="text-white dark:text-dm-6 text-xl font-bold"><i class="fa-solid fa-mug-hot text-lm-5 dark:text-dm-5 mr-2"></i>Libur Akhir Pekan!</div><div class="text-lm-5 dark:text-dm-5 text-sm mt-1">Saatnya istirahat & main game.</div>`;
                    currentScheduleState = "libur";
                    document.getElementById('break-info-container').innerHTML = ''; 
                }
                return;
            }

            const scheduleToday = dataJadwal[currentDay];
            let foundState = false;
            let newStateId = "";
            let htmlContent = '';
            let countdownStr = '';

            for (let i = 0; i < scheduleToday.length; i++) {
                const item = scheduleToday[i];
                const [startStr, endStr] = item.jam.split('-');
                const [sH, sM] = startStr.split('.').map(Number);
                const [eH, eM] = endStr.split('.').map(Number);

                const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sH, sM, 0);
                const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eH, eM, 0);

                if (now >= startTime && now < endTime) {
                    newStateId = `ongoing-${i}`;
                    const diff = endTime - now;
                    const h = Math.floor(diff / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    countdownStr = h > 0 ? `${h}j ${m}m ${s}d` : `${m}m ${s}d`;

                    if (currentScheduleState !== newStateId) {
                        htmlContent = `
                            <div class="text-[10px] sm:text-xs uppercase tracking-widest text-lm-5/90 dark:text-dm-5 font-bold mb-1">Sedang Berlangsung</div>
                            <div class="text-xl sm:text-2xl font-extrabold text-white dark:text-dm-6 leading-tight">${item.mapel}</div>
                            <div class="text-sm text-lm-5 dark:text-dm-6 mt-1 mb-2"><i class="fa-solid fa-user-tie opacity-80 mr-1"></i> ${item.guru}</div>
                            <div class="inline-block bg-lm-1/30 dark:bg-dm-3/50 px-3 py-1.5 rounded-lg border border-lm-5/30 dark:border-dm-4/50 text-xs sm:text-sm font-bold text-white dark:text-dm-6 shadow-sm mt-1">
                                <i class="fa-regular fa-hourglass-half text-lm-5 dark:text-dm-5 mr-1.5"></i> Berganti dalam <span id="countdown-timer" class="font-mono text-white dark:text-dm-6">${countdownStr}</span>
                            </div>
                        `;
                        container.innerHTML = htmlContent;
                        currentScheduleState = newStateId;
                    } else {
                        const timerEl = document.getElementById('countdown-timer');
                        if(timerEl) timerEl.innerText = countdownStr;
                    }
                    foundState = true; break;
                } else if (now < startTime) {
                    newStateId = `waiting-${i}`;
                    const diff = startTime - now;
                    const h = Math.floor(diff / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    countdownStr = h > 0 ? `${h}j ${m}m ${s}d` : `${m}m ${s}d`;

                    if (currentScheduleState !== newStateId) {
                        if (i === 0) {
                            htmlContent = `
                                <div class="text-white dark:text-dm-6 text-lg font-bold"><i class="fa-solid fa-sun text-lm-5 dark:text-dm-5 mr-2"></i>Pelajaran Belum Mulai</div>
                                <div class="inline-block bg-lm-1/30 dark:bg-dm-3/50 px-3 py-1.5 rounded-lg border border-lm-5/30 dark:border-dm-4/50 text-xs sm:text-sm font-bold text-white dark:text-dm-6 shadow-sm mt-3">
                                    <i class="fa-regular fa-clock text-lm-5 dark:text-dm-5 mr-1.5"></i> Masuk kelas dalam <span id="countdown-timer" class="font-mono text-white dark:text-dm-6">${countdownStr}</span>
                                </div>
                            `;
                        } else {
                            htmlContent = `
                                <div class="text-white dark:text-dm-6 text-lg font-bold"><i class="fa-solid fa-utensils text-lm-5 dark:text-dm-5 mr-2"></i>Waktu Istirahat / Kosong</div>
                                <div class="text-lm-5 dark:text-dm-6 text-sm mt-1 mb-2">Pelajaran selanjutnya: <strong>${item.mapel}</strong></div>
                                <div class="inline-block bg-lm-1/30 dark:bg-dm-3/50 px-3 py-1.5 rounded-lg border border-lm-5/30 dark:border-dm-4/50 text-xs sm:text-sm font-bold text-white dark:text-dm-6 shadow-sm mt-1">
                                    <i class="fa-solid fa-bell text-lm-5 dark:text-dm-5 mr-1.5"></i> Masuk dalam <span id="countdown-timer" class="font-mono text-white dark:text-dm-6">${countdownStr}</span>
                                </div>
                            `;
                        }
                        container.innerHTML = htmlContent;
                        currentScheduleState = newStateId;
                    } else {
                        const timerEl = document.getElementById('countdown-timer');
                        if(timerEl) timerEl.innerText = countdownStr;
                    }
                    foundState = true; break;
                }
            }

            if (!foundState) {
                newStateId = "selesai";
                if (currentScheduleState !== newStateId) {
                    container.innerHTML = `
                        <div class="text-white dark:text-dm-6 text-lg font-bold"><i class="fa-solid fa-house-chimney text-lm-5 dark:text-dm-5 mr-2"></i>Pelajaran Selesai!</div>
                        <div class="text-lm-5 dark:text-dm-6 text-sm mt-2">Hati-hati di jalan pulang, istirahat yang cukup.</div>
                    `;
                    currentScheduleState = newStateId;
                }
            }

            const breaksToday = breakData[currentDay] || [];
            let breakStateId = "none";
            let breakTimerStr = "";
            let currentBreakIndex = -1;

            if (foundState) { 
                for (let i = 0; i < breaksToday.length; i++) {
                    const b = breaksToday[i];
                    const [sh, sm] = b.start.split('.').map(Number);
                    const [eh, em] = b.end.split('.').map(Number);
                    const bStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sh, sm, 0);
                    const bEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eh, em, 0);

                    if (now >= bStart && now < bEnd) {
                        breakStateId = `break-ongoing-${i}`;
                        const diff = bEnd - now;
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        breakTimerStr = (h > 0 ? `${h}j ` : "") + `${m}m ${s}d`;
                        currentBreakIndex = i;
                        break;
                    } else if (now < bStart) {
                        breakStateId = `break-waiting-${i}`;
                        const diff = bStart - now;
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        breakTimerStr = (h > 0 ? `${h}j ` : "") + `${m}m ${s}d`;
                        currentBreakIndex = i;
                        break;
                    }
                }
            }

            const breakContainer = document.getElementById('break-info-container');
            if (breakContainer) {
                if (breakStateId !== currentBreakState) {
                    if (breakStateId.startsWith('break-ongoing')) {
                        breakContainer.innerHTML = `
                            <div class="inline-flex items-center gap-2 bg-emerald-500/20 dark:bg-emerald-500/20 border border-emerald-400/50 px-3 py-1.5 rounded-xl shadow-sm fade-in">
                                <i class="fa-solid fa-mug-hot text-emerald-400 dark:text-emerald-400 text-sm"></i>
                                <p class="text-[11px] sm:text-xs font-bold text-white dark:text-emerald-100">
                                    Sedang ${breaksToday[currentBreakIndex].name}! Berakhir dalam <span id="break-countdown-timer" class="font-mono ml-1 text-emerald-300 dark:text-emerald-200">${breakTimerStr}</span>
                                </p>
                            </div>
                        `;
                    } else if (breakStateId.startsWith('break-waiting')) {
                        breakContainer.innerHTML = `
                            <div class="inline-flex items-center gap-2 bg-amber-500/30 dark:bg-amber-500/20 border border-amber-400/50 px-3 py-1.5 rounded-xl shadow-sm fade-in">
                                <i class="fa-solid fa-burger text-amber-400 dark:text-amber-400 text-sm"></i>
                                <p class="text-[11px] sm:text-xs font-bold text-white dark:text-amber-100">
                                    ${breaksToday[currentBreakIndex].name} dalam <span id="break-countdown-timer" class="font-mono ml-1 text-amber-300 dark:text-amber-200">${breakTimerStr}</span>
                                </p>
                            </div>
                        `;
                    } else {
                        breakContainer.innerHTML = '';
                    }
                    currentBreakState = breakStateId;
                } else {
                    const bTimerEl = document.getElementById('break-countdown-timer');
                    if(bTimerEl) bTimerEl.innerText = breakTimerStr;
                }
            }

            if (activeTab === 'tugas') {
                renderTugasContent();
            }
        }
        
        setInterval(updateClockAndSchedule, 1000);
        updateClockAndSchedule();

        const quotes = ["Coding itu gampang, yang susah nyari errornya.", "Sistem error bukan akhir dunia, tapi awal dari debugging.", "Jadilah pencipta teknologi, bukan cuma pemakai.", "SMK Bisa! TJKT Luar Biasa!"];
        document.getElementById('daily-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

        function renderTugasContent() {
            const taskContainer = document.getElementById('task-list-container');
            if (!taskContainer) return;

            const now = new Date().getTime();
            // Filter tugas agar hanya menampilkan yang deadlinenya belum lewat
            const activeTasks = dataTugas.filter(t => new Date(t.deadline).getTime() > now);

            if (activeTasks.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-10 text-lm-1/50 dark:text-dm-5">
                        <i class="fa-solid fa-clipboard-check text-4xl mb-2 opacity-50"></i>
                        <p class="text-sm font-semibold">Tidak ada tugas aktif saat ini. Aman!</p>
                    </div>
                `;
                return;
            }

            taskContainer.innerHTML = activeTasks.map((t) => {
                const diff = new Date(t.deadline).getTime() - now;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                let sisaWaktuStr = d > 0 ? `${d} hari ${h} jam lagi` : (h > 0 ? `${h} jam ${m} menit lagi` : `${m} menit lagi`);

                return `
                    <div class="bg-white/50 dark:bg-dm-2/60 p-4 rounded-2xl border border-lm-4/30 dark:border-dm-4/30 shadow-sm flex flex-col gap-1">
                        <span class="w-max px-2.5 py-1 bg-lm-5 dark:bg-dm-3 text-lm-2 dark:text-dm-6 text-[10px] sm:text-xs font-extrabold rounded-md uppercase tracking-wider">${t.mapel}</span>
                        <h4 class="text-base font-extrabold text-lm-1 dark:text-dm-6 mt-1">${t.judul}</h4>
                        <p class="text-xs font-semibold text-rose-500 dark:text-dm-5 mt-1">
                            <i class="fa-regular fa-clock mr-1"></i> Deadline: ${new Date(t.deadline).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' })} (${sisaWaktuStr})
                        </p>
                    </div>
                `;
            }).join('');
        }

        function renderGaleriContent() {
            const galleryContainer = document.getElementById('gallery-list-container');
            if (!galleryContainer) return;

            if (dataGaleri.length === 0) {
                galleryContainer.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center text-center min-h-[250px] border-dashed border-2 border-lm-4 dark:border-dm-4/50 rounded-2xl text-lm-1/60 dark:text-dm-5">
                        <i class="fa-solid fa-images text-5xl mb-4 opacity-50"></i>
                        <h3 class="text-lg font-bold">Galeri Masih Kosong!</h3>
                        <p class="text-sm">Momen kelas akan ditampilkan di sini.</p>
                    </div>
                `;
                return;
            }

            galleryContainer.innerHTML = dataGaleri.map((p) => `
                <div class="relative group rounded-2xl overflow-hidden shadow-sm border border-lm-4/30 dark:border-dm-4/30 aspect-square bg-lm-5/20 dark:bg-dm-2">
                    <img src="${p.url}" alt="Foto Galeri" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400?text=Gambar+Rusak/Link+Mati'">
                    <div class="absolute inset-0 bg-gradient-to-t from-lm-1/90 via-lm-1/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                        <p class="text-white text-sm font-bold truncate drop-shadow-md">${p.caption}</p>
                        <p class="text-white/80 text-[10px] mb-2 font-medium">${new Date(p.date).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                    </div>
                </div>
            `).join('');
        }

        function render(view) {
            activeTab = view;
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            const activeBtn = document.getElementById('btn-' + view);
            if(activeBtn) activeBtn.classList.add('tab-active');

            const app = document.getElementById('app');
            app.classList.remove('fade-in'); void app.offsetWidth; app.classList.add('fade-in');

            if(view === 'piket') {
                app.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">` + 
                Object.entries(dataPiket).map(([hari, nama]) => `
                    <div class="glass-card p-6 rounded-3xl transition-shadow">
                        <div class="flex items-center gap-3 mb-5 border-b border-lm-4/30 dark:border-dm-4/30 pb-3">
                            <div class="w-10 h-10 rounded-xl bg-lm-5 dark:bg-dm-2 flex items-center justify-center"><i class="fa-regular fa-calendar text-lm-2 dark:text-dm-5 text-lg"></i></div>
                            <h3 class="text-lm-1 dark:text-dm-6 font-extrabold text-lg capitalize tracking-wide">${hari}</h3>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${nama.map(n => `<span class="bg-lm-5/50 dark:bg-dm-3/40 border border-lm-4/50 dark:border-dm-4/40 px-3 py-1.5 rounded-lg text-sm font-semibold text-lm-2 dark:text-dm-6">${n}</span>`).join('')}
                        </div>
                    </div>
                `).join('') + `</div>`;
            } 
            else if(view === 'struktur') {
                app.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">` + 
                struktur.map(s => `
                    <div class="glass-card p-6 rounded-3xl flex items-center gap-5">
                        <div class="w-14 h-14 flex items-center justify-center bg-lm-5 dark:bg-dm-3/50 text-lm-2 dark:text-dm-5 rounded-2xl text-2xl shadow-sm border border-lm-4/30 dark:border-dm-4/30"><i class="fa-solid ${s.icon}"></i></div>
                        <div>
                            <p class="text-xs uppercase tracking-widest font-bold text-lm-2/70 dark:text-dm-5 mb-1">${s.pos}</p>
                            <p class="font-bold text-lm-1 dark:text-dm-6 text-lg leading-tight">${s.name}</p>
                        </div>
                    </div>
                `).join('') + `</div>`;
            } 
            else if(view === 'tugas') {
                app.innerHTML = `
                    <div class="space-y-6">
                        <div class="glass-card p-6 rounded-3xl">
                            <h3 class="text-lg font-extrabold text-lm-1 dark:text-dm-6 mb-4 flex items-center gap-2"><i class="fa-solid fa-list-check text-lm-3 dark:text-dm-4"></i> Daftar Tugas Kelas</h3>
                            <div id="task-list-container" class="space-y-3"></div>
                        </div>
                    </div>
                `;
                renderTugasContent();
            }
            else if (view === 'galeri') {
                app.innerHTML = `
                    <div class="space-y-6">
                        <div class="glass-card p-6 rounded-3xl">
                            <h3 class="text-lg font-extrabold text-lm-1 dark:text-dm-6 mb-4 flex items-center gap-2"><i class="fa-solid fa-images text-lm-3 dark:text-dm-4"></i> Koleksi Foto</h3>
                            <div id="gallery-list-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
                        </div>
                    </div>
                `;
                renderGaleriContent();
            }
            else {
                app.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">` + 
                Object.entries(dataJadwal).map(([hari, mapelList]) => `
                    <div class="glass-card p-6 rounded-3xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-xl bg-lm-5 dark:bg-dm-2 flex items-center justify-center"><i class="fa-solid fa-clock text-lm-2 dark:text-dm-5 text-lg"></i></div>
                            <h3 class="text-lm-1 dark:text-dm-6 font-extrabold text-lg capitalize tracking-wide">${hari}</h3>
                        </div>
                        <div class="space-y-3 relative before:absolute before:inset-0 before:ml-2 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-lm-4/50 dark:before:via-dm-4/50 before:to-transparent pl-6">
                            ${mapelList.map((m) => `
                                <div class="relative bg-white/60 dark:bg-dm-2/80 p-4 rounded-2xl border border-lm-4/20 dark:border-dm-4/30 shadow-sm">
                                    <div class="absolute left-[-29px] top-5 w-3 h-3 bg-lm-3 dark:bg-dm-4 rounded-full border-2 border-white dark:border-dm-2 shadow"></div>
                                    <span class="inline-block px-2.5 py-1 bg-lm-5 dark:bg-dm-3 text-lm-2 dark:text-dm-6 text-xs font-bold rounded-md mb-2"><i class="fa-regular fa-hourglass-half mr-1"></i> ${m.jam}</span>
                                    <p class="text-base font-extrabold text-lm-1 dark:text-dm-6 mb-1">${m.mapel}</p>
                                    <p class="text-sm font-medium text-lm-2/80 dark:text-dm-5 flex items-center gap-1.5"><i class="fa-solid fa-user-tie text-xs opacity-70"></i> ${m.guru}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('') + `</div>`;
            }
        }
        render('piket');
    </script>
</body>
</html>
